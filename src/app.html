<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta

      content="LIT-NUMIC — Platform belajar Literasi & Numerasi interaktif berbasis komik untuk siswa SMP."

    <meta property="og:type" content="website" />

      content="LIT-NUMIC — Literacy & Numeracy Interactive Comic"
    />

      property="og:description"
